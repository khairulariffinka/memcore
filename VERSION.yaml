version: 2.0.0
name: MemCore
description: Memory intelligence layer for OpenCode — memory, reminders, work, improve, compress. Ultra-simple, 5 skills.
author: khairulariffinka
license: MIT
default_agent: memcore
topics:
  - ai-agent
  - opencode
  - memory-system
  - token-compression

core_agents:
  - memcore
  - memcore-plan

core_skills:
  - memory
  - reminders
  - work
  - improve
  - compress

features:
  - behavioural-observation
  - knowledge-library
  - memory-consolidation
  - cross-session-reminders
  - plan-execution
  - goal-driven-sessions
  - failure-learning
  - self-improvement
  - token-compression

paths:
  opencode_config: ~/.config/opencode
  opencode_agents: ~/.config/opencode/agents
  opencode_skills: ~/.config/opencode/skills
  opencode_scripts: ~/.config/opencode/scripts
  opencode_global_memory: ~/.config/opencode/global-memory

install:
  copy_core_agents: true
  copy_core_skills: true
  copy_primary_agent: true
  copy_scripts: true

update:
  preserve_user_agents: true
  preserve_user_skills: true
  update_core: true
  auto_backup: true
  conflict_resolution: true
  merge_opencode_json: true
