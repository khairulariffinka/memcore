version: 0.2.0
name: MemCore
description: Memory intelligence layer for OpenCode — behavioural observation, cross-session reminders, knowledge library, multi-project LRU tracking, self-improvement forge, work plan execution, and failure learning
author: khairulariffinka
license: MIT
default_agent: memcore
topics:
  - ai-agent
  - opencode
  - memory-system
  - behavioural-learning
  - knowledge-library
  - cross-session-reminders
  - multi-project
  - self-improvement
  - failure-learning

core_agents:
  - memcore

core_skills:
  - observation
  - reminders
  - library-system
  - lru-projects
  - forge
  - work-plan
  - post-mortem

features:
  - behavioural-observation
  - cross-session-reminders
  - knowledge-organization
  - multi-project-tracking
  - self-improvement
  - plan-execution
  - failure-learning

paths:
  opencode_config: ~/.config/opencode
  opencode_agents: ~/.config/opencode/agents
  opencode_skills: ~/.config/opencode/skills
  opencode_scripts: ~/.config/opencode/scripts

install:
  copy_core_agents: true
  copy_core_skills: true
  copy_primary_agent: true
  copy_scripts: true

update:
  preserve_user_agents: true
  preserve_user_skills: true
  update_core: true
  auto_backup: true
  conflict_resolution: true
  merge_opencode_json: true
